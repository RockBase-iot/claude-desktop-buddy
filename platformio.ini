[env:m5stickc-plus]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.f_cpu = 160000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0
build_src_filter = +<*> +<buddies/>
lib_deps =
    m5stack/M5StickCPlus
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

; ---------------------------------------------------------------------------
; NM 2.8" display board (ESP32-S3, ST7789 320×240, QMI8658 IMU, AXP2101 PMU)
; ---------------------------------------------------------------------------
[env:nm-display-28]
platform = espressif32@6.6.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DNM28_BOARD
    ; TFT_eSPI pin config for NM28 ST7789 (240×320 portrait native)
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DCGRAM_OFFSET
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=1
    -DTFT_SCLK=5
    -DTFT_CS=-1
    -DTFT_DC=3
    -DTFT_RST=-1
    -DTFT_BL=6
    -DSPI_FREQUENCY=80000000
    -DSPI_READ_FREQUENCY=20000000
build_src_filter = +<*> +<buddies/>
lib_deps =
    Bodmer/TFT_eSPI
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
    lewisxhe/XPowersLib
    lewisxhe/SensorLib
    BLE
